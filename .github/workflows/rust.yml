name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

permissions:
  contents: write

jobs:
  check:
    name: Cargo Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - run: cargo check --all-features

  build:
    name: Build
    needs: check

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux-x86_64
            exe: ""

          - os: windows-latest
            artifact: windows-x86_64
            exe: ".exe"

          - os: macos-latest
            artifact: macos-aarch64
            exe: ""

          - os: macos-15-intel
            artifact: macos-x86_64
            exe: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir dist
          cp target/release/YOUR_BINARY${{ matrix.exe }} dist/YOUR_BINARY-${{ matrix.artifact }}${{ matrix.exe }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  release:
    name: GitHub Release
    needs: build

    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*