name: CI Build

on:
  push:
    branches:
      - "main"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  check:
    name: Cargo Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libfontconfig1-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libxcursor-dev \
            libxinerama-dev \
            libgl1-mesa-dev

      - name: Cargo Check
        run: cargo check --all-features

  build:
    name: Build
    needs: check

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux-x86_64
            exe: ""

          - os: windows-latest
            artifact: windows-x86_64
            exe: ".exe"

          - os: macos-latest
            artifact: macos-aarch64
            exe: ""

          - os: macos-15-intel
            artifact: macos-x86_64
            exe: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libfontconfig1-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libxcursor-dev \
            libxinerama-dev \
            libgl1-mesa-dev

      - name: Build
        run: cargo build --release

      - name: Show build output
        shell: bash
        run: ls -la target/release

      - name: Detect binary
        shell: bash
        run: |
          echo "=== target/release ==="
          ls -la target/release

          if [ "${{ runner.os }}" == "Windows" ]; then
            BIN=$(ls target/release | grep '^pumpkin-ui\.exe$' || true)
          else
            BIN=$(ls target/release | grep '^pumpkin-ui$' || true)
          fi

          if [ -z "$BIN" ]; then
            echo "ERROR: binary not found"
            ls target/release
            exit 1
          fi

          echo "BIN=$BIN" >> $GITHUB_ENV
          echo "Detected: $BIN"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/release/${{ env.BIN }}
